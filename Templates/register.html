<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | PHASAL</title>
  <link rel="icon" href="/static/images/image2.png" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
    <div id="background-blur"></div>
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <img src="/static/images/image2.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top rounded-circle">
        PHASAL
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
         
          <li class="nav-item"><a class="nav-link active btn btn-light text-success px-3 py-1 ms-2" href="userlogin.html">User Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-5 shadow" style="max-width: 400px; width: 100%;">
      <h3 class="text-center text-success mb-4">Register | PHASAL</h3>
      <form action="index.html" method="POST">
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" name="email" required placeholder="Enter your email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label"> Create Password</label>
          <input type="password" class="form-control" name="password" required placeholder="Create password">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label"> Confirm Password</label>
            <input type="password" class="form-control" name="password" required placeholder="Confirm your password">
          </div>
        <button type="submit" class="btn btn-success w-100">Sign-in</button>
        <p class="mt-3 text-center">Already have an account? <a href="userlogin.html">Log-in</a></p>
      </form>
    </div>
  </section>

  <script src="../static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
